<!DOCTYPE html>
<html>
<head>
  <title>CodeROblox</title>
  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      background: #111827;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      color: #00ffcc;
    }

    .subtitle {
      color: #aaa;
      margin-top: 5px;
    }

    .section {
      margin-top: 30px;
    }

    .code-box {
      background: #1a1f2e;
      margin: 15px auto;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #00ffcc;
      cursor: pointer;
      font-weight: bold;
    }

    .msg {
      margin-top: 10px;
      color: #00ffcc;
    }

    .expired {
      opacity: 0.5;
    }
  </style>
</head>
<body>

<header>🔥 CodeROblox 🔥</header>
<p class="subtitle">Your #1 Roblox Codes Website 🚀</p>

<div class="section">
  <h2>🟢 Working Codes</h2>

  <div class="code-box">
    <h3 id="c1">700KLIKESTYSM</h3>
    <button onclick="copy('c1','m1')">Copy</button>
    <p id="m1" class="msg"></p>
  </div>

  <div class="code-box">
    <h3 id="c2">600KLIKESTY</h3>
    <button onclick="copy('c2','m2')">Copy</button>
    <p id="m2" class="msg"></p>
  </div>

  <div class="code-box">
    <h3 id="c3">BIGUPDATESOON</h3>
    <button onclick="copy('c3','m3')">Copy</button>
    <p id="m3" class="msg"></p>
  </div>

  <div class="code-box">
    <h3 id="c4">QOLUPDATE</h3>
    <button onclick="copy('c4','m4')">Copy</button>
    <p id="m4" class="msg"></p>
  </div>
</div>

<div class="section">
  <h2>🔴 Expired Codes</h2>

  <div class="code-box expired">
    <h3>OLDUPDATECODE</h3>
  </div>

  <div class="code-box expired">
    <h3>RELEASECODE</h3>
  </div>
</div>

<script>
function copy(codeId, msgId) {
  let text = document.getElementById(codeId).innerText;
  navigator.clipboard.writeText(text);

  let msg = document.getElementById(msgId);
  msg.innerText = "✅ Copied!";

  setTimeout(() => {
    msg.innerText = "";
  }, 2000);
}
</script>

</body>
</html>
